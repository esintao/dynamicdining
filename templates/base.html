<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Recipe App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav>
        {% if session.get('user_id') %}
        <a href="{{ url_for('household.households') }}">Select Household</a>

        {% if session.get('household_id') %}
        <a href="{{ url_for('household.home') }}">Home</a>
        <a href="{{ url_for('stock.stock_page') }}">Stock</a>
        <a href="{{ url_for('recipes.recipes_page') }}">Recipes</a>
        
        {% endif %}

        <a href="{{ url_for('auth.logout') }}">Logout</a>
        {% else %}
        <a href="{{ url_for('auth.login_page') }}">Login</a>
        {% endif %}
    </nav>

    <hr>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
