{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Share Your Recipe</h1>
        <a href="{{ url_for('recipes.recipes_page') }}" class="btn-back">← Back to Catalogue</a>
    </div>

    <form method="POST" action="{{ url_for('recipes.add_recipe') }}" class="recipe-form">
        <div class="form-group">
            <label for="r_name">Recipe Title *</label>
            <input type="text" id="r_name" name="r_name" required placeholder="e.g., Grandma's Lasagna">
        </div>

        <div class="form-row">
            <div class="form-group basis-half">
                <label for="cooking_time">Cooking Time (minutes)</label>
                <input type="number" id="cooking_time" name="cooking_time" min="1" placeholder="e.g., 45">
            </div>
            <div class="form-group basis-half">
                <label for="tags">Tags (Comma separated)</label>
                <input type="text" id="tags" name="tags" placeholder="e.g., dinner, pasta, Italian">
            </div>
        </div>

        <div class="form-group">
            <label for="description">Short Description</label>
            <textarea id="description" name="description" rows="3" placeholder="Briefly describe what makes this recipe special..."></textarea>
        </div>

        <div class="ingredients-section">
            <div class="ingredients-section-header">
                <h3>Ingredients</h3>
                <span class="database-notice">💡 Typing an item that isn't in the list will automatically add it to the database!</span>
            </div>
            
            <div id="ingredients-container">
                <div class="ingredient-row">
                    <input type="text" name="ingredient_name[]" list="master-ingredients" placeholder="Ingredient name (e.g., Flour)" required autocomplete="off">
                    <input type="text" name="quantity[]" placeholder="Qty (e.g., 200)">
                    <input type="text" name="unit[]" placeholder="Unit (e.g., g, ml, tbsp)">
                    <button type="button" class="btn-remove" onclick="removeRow(this)">✕</button>
                </div>
            </div>
            <button type="button" id="btn-add-ingredient" class="btn-secondary">+ Add Ingredient Row</button>
        </div>

        <datalist id="master-ingredients">
            {% for ing in ingredients %}
                <option value="{{ ing[0] }}"></option>
            {% endfor %}
        </datalist>

        <div class="form-group">
            <label for="instructions">Preparation Instructions *</label>
            <textarea id="instructions" name="instructions" rows="8" required placeholder="Step 1. Preheat oven to 200°C...&#10;Step 2. Mix ingredients..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit">Publish Recipe</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('btn-add-ingredient').addEventListener('click', function() {
        const container = document.getElementById('ingredients-container');
        const newRow = document.createElement('div');
        newRow.className = 'ingredient-row';
        newRow.innerHTML = `
            <input type="text" name="ingredient_name[]" list="master-ingredients" placeholder="Ingredient name" required autocomplete="off">
            <input type="text" name="quantity[]" placeholder="Qty">
            <input type="text" name="unit[]" placeholder="Unit">
            <button type="button" class="btn-remove" onclick="removeRow(this)">✕</button>
        `;
        container.appendChild(newRow);
    });

    function removeRow(button) {
        const rows = document.querySelectorAll('.ingredient-row');
        if(rows.length > 1) {
            button.parentElement.remove();
        } else {
            alert("A recipe must have at least one ingredient!");
        }
    }
</script>

<style>
    .form-container { max-width: 700px; margin: 40px auto; padding: 25px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.03); color: #333; }
    .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
    .form-header h1 { margin: 0; font-size: 1.75rem; color: #111; }
    .btn-back { text-decoration: none; color: #64748b; font-size: 0.95rem; font-weight: 500; }
    .btn-back:hover { color: #1e293b; text-decoration: underline; }
    
    .recipe-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
    .basis-half { flex: 1; min-width: 200px; }
    
    label { font-weight: bold; font-size: 0.85rem; color: #475569; }
    input[type="text"], input[type="number"], textarea { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
    input:focus, textarea:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
    
    .ingredients-section { background: #f8f9fa; border: 1px solid #e2e8f0; padding: 20px; border-radius: 6px; }
    .ingredients-section-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px; gap: 10px; }
    .ingredients-section h3 { margin: 0; font-size: 1.1rem; color: #1e293b; }
    .database-notice { font-size: 0.8rem; color: #2e7d32; font-weight: 600; }
    
    .ingredient-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .ingredient-row input[name="ingredient_name[]"] { flex: 2; }
    .ingredient-row input[name="quantity[]"], .ingredient-row input[name="unit[]"] { flex: 1; }
    
    .btn-remove { background: #fff5f5; color: #c92a2a; border: 1px solid #ffe3e3; padding: 9px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.1s; }
    .btn-remove:hover { background: #ffe3e3; }
    
    .btn-secondary { background: white; color: #1e293b; border: 1px solid #cbd5e1; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.85rem; margin-top: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .btn-secondary:hover { background: #f1f5f9; }
    
    .btn-submit { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 1.05rem; font-weight: bold; width: 100%; margin-top: 10px; transition: background 0.15s; }
    .btn-submit:hover { background: #235e26; }
</style>
{% endblock %}
